{% if products %}
<div class="row">

  <div class="col-lg-3">
    <div class="mb-3">
      <a href="{{ compare }}" id="compare-total" class="btn btn-primary d-block"><i class="fa-solid fa-arrow-right-arrow-left"></i> <span class="d-none d-xl-inline">{{ text_compare }}</span></a>
    </div>
  </div>

  <div class="col-lg-1 d-none d-lg-block">
    <div class="btn-group">
      <button type="button" id="button-list" class="btn btn-light" title="{{ button_list }}"><i class="fa-solid fa-table-list"></i></button>
      <button type="button" id="button-grid" class="btn btn-light" title="{{ button_grid }}"><i class="fa-solid fa-table-cells"></i></button>
    </div>
  </div>

  <div class="col-lg-4 offset-lg-1 col-6">
    <div class="input-group mb-3">
      <label for="input-sort" class="input-group-text">{{ text_sort }}</label>
      <select id="input-sort" class="form-select" data-on="change:onChange">
        <option value="">{{ text_default }}</option>
        <option value="name-asc"{% if sort == 'name-asc' %} selected{% endif %}>{{ text_name_asc }}</option>
        <option value="name-desc"{% if sort == 'name-desc' %} selected{% endif %}>{{ text_name_desc }}</option>
        <option value="price-asc"{% if sort == 'price-asc' %} selected{% endif %}>{{ text_price_asc }}</option>
        <option value="price-desc"{% if sort == 'price-desc' %} selected{% endif %}>{{ text_price_desc }}</option>
        <option value="rating-asc"{% if sort == 'rating-asc' %} selected{% endif %}>{{ text_rating_asc }}</option>
        <option value="rating-desc"{% if sort == 'rating-desc' %} selected{% endif %}>{{ text_rating_desc }}</option>
        <option value="model-asc"{% if sort == 'model-asc' %} selected{% endif %}>{{ text_model_asc }}</option>
        <option value="model-desc"{% if sort == 'model-desc' %} selected{% endif %}>{{ text_model_desc }}</option>
      </select>
    </div>
  </div>

  <div class="col-lg-3 col-6">
    <div class="input-group mb-3">
      <label for="input-limit" class="input-group-text">{{ text_limit }}</label>
      <select id="input-limit" class="form-select" data-on="change:onChange">


        {% for limits in limits %}
          <option value="{{ limits.href }}"{% if limits.value == limit %} selected{% endif %}>{{ limits.text }}</option>
        {% endfor %}
      </select>

    </div>
  </div>

</div>

<div id="product-list" class="row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-lg-4">
  {% for product_id in products %}
  <div class="col mb-3"><product-thumb product_id="{{ product_id }}"></product-thumb></div>
  {% endfor %}
</div>

<div class="row">
  <div class="col-sm-6 text-start"><x-pagination href="{{ pagination }}" target="#list" page="{{ page }}" limit="{{ limit }}" total="{{ total }}"></x-pagination></div>
  <div class="col-sm-6 text-end">{{ results }}</div>
</div>

{% else %}
<p>{{ text_no_results }}</p>
{% endif %}
